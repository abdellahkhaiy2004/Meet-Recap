name: auto_derdacha
description: Multilingual meeting recorder and summarizer (Darija / French / English) using Groq Whisper + LLM.
publish_to: none

version: 0.0.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio capture
  record: ^5.1.2

  # Audio replay
  just_audio: ^0.9.40

  # HTTP client
  dio: ^5.4.3+1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Markdown rendering
  flutter_markdown: ^0.7.3

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24   # bundles SQLite for Android/iOS
  path_provider: ^2.1.3
  path: ^1.9.0                    # p.join() for LazyDatabase path construction

  # Calendar UI
  table_calendar: ^3.1.2

  # Local notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4                    # required by flutter_local_notifications for exact scheduling

  # Permissions
  permission_handler: ^11.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Icons
  lucide_icons: ^0.257.0

  # Animations
  flutter_animate: ^4.5.0

  # Env / prefs
  shared_preferences: ^2.3.2

dependency_overrides:
  # record_linux 0.7.2 doesn't implement startStream from record_platform_interface 1.5.0
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
